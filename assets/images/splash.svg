<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16162b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="auroraSplash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="splashGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#splashGradient)"/>
  
  <!-- Animated aurora waves (static representation) -->
  <path d="M 0 300 Q 200 200 400 250 Q 600 300 800 200" 
        stroke="url(#auroraSplash)" 
        stroke-width="4" 
        fill="none" 
        opacity="0.3"
        filter="url(#splashGlow)"/>
  
  <path d="M 0 350 Q 250 250 400 300 Q 550 350 800 250" 
        stroke="url(#auroraSplash)" 
        stroke-width="3" 
        fill="none" 
        opacity="0.2"
        filter="url(#splashGlow)"/>
  
  <path d="M 0 400 Q 300 300 400 350 Q 500 400 800 300" 
        stroke="url(#auroraSplash)" 
        stroke-width="2" 
        fill="none" 
        opacity="0.15"
        filter="url(#splashGlow)"/>
  
  <!-- Logo -->
  <g transform="translate(400, 280)">
    <circle cx="0" cy="0" r="80" fill="url(#auroraSplash)" opacity="0.15"/>
    
    <path d="M -60 0 Q -40 -40 0 -20 Q 40 0 60 -40" 
          stroke="url(#auroraSplash)" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round"
          filter="url(#splashGlow)"/>
    
    <path d="M -60 20 Q -20 -10 0 10 Q 20 30 60 -10" 
          stroke="url(#auroraSplash)" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.7"
          filter="url(#splashGlow)"/>
    
    <path d="M -60 40 Q 0 10 0 30 Q 0 50 60 10" 
          stroke="url(#auroraSplash)" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.5"
          filter="url(#splashGlow)"/>
    
    <circle cx="0" cy="0" r="20" fill="url(#auroraSplash)" filter="url(#splashGlow)"/>
    <path d="M 0 -20 L 0 20 M -10 20 Q 0 30 10 20" 
          stroke="white" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"/>
  </g>
  
  <!-- App name -->
  <text x="400" y="420" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle"
        filter="url(#splashGlow)">
    Aurora Music
  </text>
  
  <!-- Tagline -->
  <text x="400" y="460" 
        font-family="Arial, sans-serif" 
        font-size="18" 
        fill="#a0a0a0" 
        text-anchor="middle">
    Experience Sound in a New Light
  </text>
  
  <!-- Loading bar placeholder -->
  <rect x="300" y="500" width="200" height="4" rx="2" fill="#252542"/>
  <rect x="300" y="500" width="100" height="4" rx="2" fill="url(#auroraSplash)">
    <animate attributeName="width" from="0" to="200" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
