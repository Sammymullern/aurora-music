<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="auroraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#auroraGradient)" opacity="0.1"/>
  
  <!-- Main aurora wave -->
  <path d="M 30 100 Q 50 60 100 80 Q 150 100 170 60" 
        stroke="url(#auroraGradient)" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Secondary wave -->
  <path d="M 30 120 Q 60 90 100 110 Q 140 130 170 90" 
        stroke="url(#auroraGradient)" 
        stroke-width="6" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.7"
        filter="url(#glow)"/>
  
  <!-- Tertiary wave -->
  <path d="M 30 140 Q 70 110 100 130 Q 130 150 170 110" 
        stroke="url(#auroraGradient)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.5"
        filter="url(#glow)"/>
  
  <!-- Music note -->
  <circle cx="100" cy="100" r="15" fill="url(#auroraGradient)" filter="url(#glow)"/>
  <path d="M 100 85 L 100 115 M 90 115 Q 100 125 110 115" 
        stroke="white" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
</svg>
